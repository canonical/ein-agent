env:
  # UTCP Service Configuration
  # Services are configured via OpenAPI spec endpoints
  - name: UTCP_SERVICES
    value: kubernetes,grafana,prometheus,loki

  # Kubernetes UTCP Configuration
  # NOTE: Kubernetes ONLY supports kubeconfig auth (no bearer token support)
  - name: UTCP_KUBERNETES_OPENAPI_URL
    value: https://kubernetes.default.svc.cluster.local/openapi/v2
  - name: UTCP_KUBERNETES_AUTH_TYPE
    value: kubeconfig  # REQUIRED: Must be kubeconfig
  - name: UTCP_KUBERNETES_ENABLED
    value: "true"
  - name: UTCP_KUBERNETES_VERSION
    value: "1.35"
  - name: UTCP_KUBERNETES_INSECURE
    value: "true"  # For clusters with self-signed certificates

  # Grafana UTCP Configuration
  # NOTE: Grafana uses bearer token (service account token)
  - name: UTCP_GRAFANA_OPENAPI_URL
    value: https://grafana.cos.svc.cluster.local:3000/api/swagger.json
  - name: UTCP_GRAFANA_AUTH_TYPE
    value: bearer  # Service account token
  - name: UTCP_GRAFANA_ENABLED
    value: "true"
  - name: UTCP_GRAFANA_VERSION
    value: "12"
  - name: UTCP_GRAFANA_INSECURE
    value: "true"  # For self-signed certificates

  # Prometheus UTCP Configuration
  # NOTE: Prometheus typically requires no authentication when accessed via COS proxy
  - name: UTCP_PROMETHEUS_OPENAPI_URL
    value: http://prometheus.cos.svc.cluster.local:9090
  - name: UTCP_PROMETHEUS_AUTH_TYPE
    value: none  # No authentication required
  - name: UTCP_PROMETHEUS_ENABLED
    value: "true"
  - name: UTCP_PROMETHEUS_VERSION
    value: "3.5.0"

  # Loki UTCP Configuration
  # NOTE: Loki uses a hand-written OpenAPI spec (Loki does not ship an official one)
  # No authentication required when accessed via COS proxy
  - name: UTCP_LOKI_OPENAPI_URL
    value: http://loki.cos.svc.cluster.local:3100
  - name: UTCP_LOKI_AUTH_TYPE
    value: none  # No authentication required
  - name: UTCP_LOKI_ENABLED
    value: "true"
  - name: UTCP_LOKI_VERSION
    value: "3"

  # Agent model
  - name: EIN_AGENT_MODEL
    value: "gemini/gemini-3-flash-preview"

  # Alertmanager
  - name: ALERTMANAGER_URL
    value: http://alertmanager.cos.svc.cluster.local:9093

  # LiteLLM: disable SSL verification (ONLY for mitmproxy debugging, remove for production)
  # - name: SSL_VERIFY
  #   value: "False"

  # Proxy env vars (HTTP_PROXY, HTTPS_PROXY, NO_PROXY) are injected by
  # juju model-config (juju-http-proxy, juju-https-proxy, juju-no-proxy),
  # NOT set here — see docs/how-to-deploy-ein-agent.md for details.

juju:
  # Gemini API key
  - secret-id: <gemini-secret-id>
    name: GEMINI_API_KEY
    key: api-key

  # Kubernetes kubeconfig (base64-encoded) - REQUIRED for K8s
  - secret-id: <kubernetes-secret-id>
    name: UTCP_KUBERNETES_KUBECONFIG_CONTENT
    key: kubeconfig-content

  # Grafana service account token - REQUIRED for Grafana
  - secret-id: <grafana-secret-id>
    name: UTCP_GRAFANA_TOKEN
    key: token
